global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "ledgerflow-api"
    metrics_path: "/metrics"
    static_configs:
      - targets:
          - "api:3000"

  - job_name: "ledgerflow-workers"
    metrics_path: "/metrics"
    static_configs:
      - targets:
          - "api:3000"

  - job_name: "prometheus"
    static_configs:
      - targets:
          - "prometheus:9090"
