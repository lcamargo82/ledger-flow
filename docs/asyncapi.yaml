asyncapi: 3.0.0
info:
  title: LedgerFlow Async Messaging API
  version: 1.0.0
  description: Event-driven architecture components for LedgerFlow using RabbitMQ.
servers:
  rabbitmq:
    host: localhost:5672
    protocol: amqp
channels:
  payment.commands.q:
    address: ledgerflow.payment.commands.q
    messages:
      paymentCommand:
        $ref: '#/components/messages/PaymentChargeRequested'
  webhook.commands.q:
    address: ledgerflow.webhooks.commands.q
    messages:
      webhookCommand:
        $ref: '#/components/messages/WebhookInboundRequested'
  inventory.events:
    address: ledgerflow.inventory.events
    messages:
      reservationConsumed:
        $ref: '#/components/messages/InventoryReservationConsumed'
components:
  messages:
    PaymentChargeRequested:
      name: payment.provider_charge_creation_requested
      title: Provider Charge Creation Requested
      summary: Command to create a charge in an external provider.
      payload:
        type: object
        properties:
          messageId:
            type: string
          eventType:
            type: string
          aggregateId:
            type: string
          tenantId:
            type: string
    WebhookInboundRequested:
      name: webhook.inbound_processing_requested
      title: Webhook Inbound Processing Requested
      summary: Command to process an inbound webhook asynchronously.
      payload:
        type: object
        properties:
          messageId:
            type: string
          eventType:
            type: string
          aggregateId:
            type: string
    InventoryReservationConsumed:
      name: inventory.reservation.consumed
      title: Inventory Reservation Consumed
      summary: Event emitted when an active inventory reservation is fully consumed.
      payload:
        type: object
        required:
          - reservationId
          - skuId
          - warehouseId
          - quantity
          - movementId
        properties:
          reservationId:
            type: string
          skuId:
            type: string
          warehouseId:
            type: string
          quantity:
            type: number
            format: decimal
          movementId:
            type: string
