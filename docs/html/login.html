<style>
        body {
            background-color: #09090b; /* Zinc 950 */
            color: #f8fafc;
        }
        .glass-card {
            background-color: #18181b; /* Zinc 900 Surface Level 1 */
            border: 1px solid #27272a; /* Zinc 800 Border */
        }

            border-color: #06B6D4;
            box-shadow: 0 0 0 2px rgba(6, 182, 212, 0.2);

<body class="min-h-screen flex flex-col justify-center items-center p-4 antialiased">
<!-- Decorative ambient glow -->
<div class="fixed inset-0 overflow-hidden pointer-events-none">
<div class="absolute -top-[25%] -left-[10%] w-[50%] h-[50%] bg-[#4F46E5] rounded-full blur-[120px] opacity-[0.05]"></div>
<div class="absolute -bottom-[25%] -right-[10%] w-[50%] h-[50%] bg-[#10B981] rounded-full blur-[120px] opacity-[0.05]"></div>
</div>
<!-- Main Content Canvas - Suppressed Shells due to transactional intent -->
<main class="w-full max-w-[480px] z-10 relative">
<!-- Logo Header -->
<div class="flex flex-col items-center mb-8">
<img alt="LedgerFlow Logo" class="h-20 w-auto object-cover object-[center_15%] rounded-xl shadow-sm" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCcnwlEGF248ZDKwvrIdcchVFHtnhBQFqghjHvbViDwLc4VFBpkuhURGMerpSjtqmxC0MAQNsXZGChn73yZtH1SypDC53EaMa8AYEhdlGhIaJ8CPWfxKleCK9twZNc7qb4TPO8ZdLAcgSZFJbtHbrgNkiB1Zet2ddr8R3dENJ9UD41S0SW88OCjDLs42PCoiLL_VBvHU_Pf53OMTy_NGqaar4WHxuQtOjBlJzTuyvCgY2x2-9Xchii_6sdtak9FWnPYxzeAr2cRn78"/>
</div>
<!-- Login Card -->
<div class="glass-card rounded-xl p-8 shadow-2xl">
<div class="text-center mb-8">
<h2 class="text-headline-sm font-headline-sm text-on-surface mb-2">Acessar plataforma</h2>
<p class="text-body-md font-body-md text-on-surface-variant">Entre com suas credenciais para acessar o painel</p>
</div>
<form class="space-y-6">
<!-- Email Input -->
<div class="space-y-2">
<label class="block text-label-md font-label-md text-on-surface-variant" for="email">E-mail corporativo</label>
<div class="relative input-focus-ring rounded-lg transition-shadow duration-200">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-sm">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 bg-background border border-surface-variant rounded-lg text-body-md font-body-md text-on-surface placeholder:text-[#64748B] focus:outline-none focus:ring-0 focus:border-transparent transition-colors" id="email" name="email" placeholder="voce@empresa.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<label class="block text-label-md font-label-md text-on-surface-variant" for="password">Senha de acesso</label>
<div class="relative input-focus-ring rounded-lg transition-shadow duration-200">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-sm">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-3 bg-background border border-surface-variant rounded-lg text-body-md font-body-md text-on-surface placeholder:text-[#64748B] focus:outline-none focus:ring-0 focus:border-transparent transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button aria-label="Toggle password visibility" class="absolute inset-y-0 right-0 pr-3 flex items-center text-on-surface-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-sm">visibility</span>
</button>
</div>
</div>
<!-- Forgot Password Link -->
<div class="flex items-center justify-between">
<div class="flex items-center">
<input class="h-4 w-4 rounded border-surface-variant bg-background text-[#06B6D4] focus:ring-[#06B6D4] focus:ring-offset-background" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-body-sm font-body-sm text-on-surface-variant" for="remember-me">Lembrar-me</label>
</div>
<div class="text-body-sm font-body-sm">
<a class="font-medium text-[#06B6D4] hover:text-[#10B981] transition-colors" href="#">Esqueci minha senha</a>
</div>
</div>
<!-- Submit Button -->
<div>
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-body-md font-body-md font-medium text-white bg-gradient-to-r from-[#4F46E5] to-[#10B981] hover:from-[#3B82F6] hover:to-[#06B6D4] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#06B6D4] focus:ring-offset-background transition-all duration-200" type="submit">
                        Entrar
                    </button>
</div>
</form>
</div>
<!-- Demo Credentials Box -->
<div class="mt-6 border border-[#27272A] bg-[#13121B] rounded-lg p-4 text-center">
<p class="text-label-sm font-label-sm text-on-surface-variant mb-1 uppercase tracking-wider">Demo Credentials</p>
<p class="text-body-sm font-body-sm text-on-surface font-mono">owner@ledgerflow.local <span class="text-on-surface-variant mx-1">/</span> ChangeMe123!</p>
</div>
</main>
